aspen:
  minimal_context: true

  inference_pipeline:
    - type: LoadImageFromFile
    - type: HmCrop
      keys: [img]
    - type: HmImageToTensor
      keys: [img]
    - type: HmResize
      img_scale: [1312, 480]
      keep_ratio: true
      interpolation: area
    - type: HmPad
      pad_val: 114.0
      size_divisor: 32
    - type: mmdet.PackTrackInputs
      meta_keys: [img_metas]

  video_out_pipeline:
    - type: HmConfigureScoreboard
    - type: HmCaptureScoreboard
      scoreboard_scale: GLOBAL.rink.scoreboard.scoreboard_scale
    - type: HmPerspectiveRotation
      pre_clip: true
    - type: HmCropToVideoFrame
    - type: HmRenderScoreboard
      image_labels: [img, end_zone_img]
    - type: HmUnsharpMask
      enabled: false
      image_label: img
    - type: HmImageOverlays
      watermark_config:
        image: images/sports_ai_watermark.png

  plugins:
    stitching:
      class: hmlib.aspen.plugins.stitching_plugin.StitchingPlugin
      depends: []
      enabled: GLOBAL.stitching.enabled
      params:
        pto_project_file: GLOBAL.stitching.pto_project_file
        dir_name: GLOBAL.stitching.dir_name
        blend_mode: GLOBAL.stitching.blend_mode
        max_blend_levels: GLOBAL.stitching.max_blend_levels
        auto_adjust_exposure: GLOBAL.stitching.auto_adjust_exposure
        python_blender: GLOBAL.stitching.python_blender
        use_cuda_pano_n: GLOBAL.stitching.use_cuda_pano_n
        minimize_blend: GLOBAL.stitching.minimize_blend
        dtype: GLOBAL.stitching.dtype
        no_cuda_streams: GLOBAL.stitching.no_cuda_streams
        post_stitch_rotate_degrees: GLOBAL.stitching.post_stitch_rotate_degrees
        left_color_pipeline: GLOBAL.stitching.left_stitch_pipeline
        right_color_pipeline: GLOBAL.stitching.right_stitch_pipeline
        capture_rgb_stats: GLOBAL.stitching.capture_rgb_stats
        max_output_width: GLOBAL.stitching.max_output_width

    image_prep:
      class: hmlib.aspen.plugins.image_prep_plugin.ImagePrepPlugin
      depends: [stitching]
      params: {}

    model_factory:
      class: hmlib.aspen.plugins.model_factory_plugin.ModelFactoryPlugin
      depends: []
      params:
        model_class: hmlib.models.end_to_end_plugin.HmEndToEnd
        # post_* pipelines not used for rink mask
        post_tracking_pipeline: []

    boundaries:
      class: hmlib.aspen.plugins.boundaries_plugin.BoundariesPlugin
      depends: [model_factory]
      params: {}

    pose_factory:
      class: hmlib.aspen.plugins.pose_factory_plugin.PoseInferencerFactoryPlugin
      depends: []
      params:
        pose_config: GLOBAL.model.pose_coco.config
        pose_checkpoint: GLOBAL.model.pose_coco.checkpoint
        show_progress: false

    pose_join:
      class: hmlib.aspen.plugins.join_plugin.JoinPlugin
      depends: [image_prep, pose_factory]
      params:
        required_plugins: [image_prep, pose_factory]
        output_key: pose_joined

    pose:
      class: hmlib.aspen.plugins.pose_plugin.PosePlugin
      depends: [pose_join]
      params:
        plot_pose: GLOBAL.plot.plot_pose

    pose_to_det:
      class: hmlib.aspen.plugins.pose_to_det_plugin.PoseToDetPlugin
      depends: [pose]
      params: {}

    ice_config:
      class: hmlib.aspen.plugins.ice_rink_boundaries_plugins.IceRinkSegmConfigPlugin
      depends: [image_prep]
      params: {}

    ice_boundaries_join:
      class: hmlib.aspen.plugins.join_plugin.JoinPlugin
      depends: [pose_to_det, ice_config]
      params:
        required_plugins: [pose_to_det, ice_config]
        output_key: ice_boundaries_joined

    ice_boundaries:
      class: hmlib.aspen.plugins.ice_rink_boundaries_plugins.IceRinkSegmBoundariesPlugin
      depends: [ice_boundaries_join]
      params:
        raise_bbox_center_by_height_ratio: GLOBAL.ice_boundaries.raise_bbox_center_by_height_ratio
        lower_bbox_bottom_by_height_ratio: GLOBAL.ice_boundaries.lower_bbox_bottom_by_height_ratio
        max_detections_in_mask: 50

    tracker_join:
      class: hmlib.aspen.plugins.join_plugin.JoinPlugin
      depends: [pose_to_det, ice_boundaries, model_factory, boundaries]
      params:
        required_plugins: [pose_to_det, ice_boundaries, model_factory, boundaries]
        output_key: tracker_joined

    tracker:
      class: hmlib.aspen.plugins.tracker_plugin.TrackerPlugin
      depends: [tracker_join]
      params: {}

    # New: MMAction2 action recognition from poses per tracked player
    action_factory:
      class: hmlib.aspen.plugins.action_factory_plugin.ActionRecognizerFactoryPlugin
      depends: []
      params:
        action_config: GLOBAL.model.action_posec3d.config
        action_checkpoint: GLOBAL.model.action_posec3d.checkpoint
        # Optional: label map (defaults to NTU60 label map if omitted)
        # label_map_path: openmm/mmaction2/tools/data/skeleton/label_map_ntu60.txt

    actions_join:
      class: hmlib.aspen.plugins.join_plugin.JoinPlugin
      depends: [tracker, action_factory]
      params:
        required_plugins: [tracker, action_factory]
        output_key: actions_joined

    actions:
      class: hmlib.aspen.plugins.action_pose_plugin.ActionFromPosePlugin
      depends: [actions_join]
      params:
        top_k: 3
        score_threshold: 0.0

    jersey_numbers:
      class: hmlib.aspen.plugins.jersey_pose_plugin.JerseyNumberFromPosePlugin
      depends: [tracker]
      params: {}

    # Save outputs to dataframes (order matters so actions/jerseys are included)
    save_actions:
      class: hmlib.aspen.plugins.save_plugins.SaveActionsPlugin
      depends: [actions]
      params: {}

    save_detections:
      class: hmlib.aspen.plugins.save_plugins.SaveDetectionsPlugin
      depends: [pose_to_det]
      params: {}

    save_pose:
      class: hmlib.aspen.plugins.save_plugins.SavePosePlugin
      depends: [pose]
      params: {}

    save_tracking:
      class: hmlib.aspen.plugins.save_plugins.SaveTrackingPlugin
      depends: [actions]
      params: {}

    postprocess_join:
      class: hmlib.aspen.plugins.join_plugin.JoinPlugin
      depends: [save_tracking, jersey_numbers]
      params:
        required_plugins: [save_tracking, jersey_numbers]
        output_key: postprocess_joined

    postprocess:
      class: hmlib.aspen.plugins.postprocess_plugin.CamPostProcessPlugin
      depends: [postprocess_join]
      params: {}

    overlays:
      class: hmlib.aspen.plugins.overlay_plugin.OverlayPlugin
      depends: [actions]
      enabled: true
      params:
        plot_pose: GLOBAL.plot.plot_pose
        plot_jersey_numbers: GLOBAL.plot.plot_jersey_numbers
        plot_tracking: GLOBAL.plot.plot_individual_player_tracking
        plot_all_detections: GLOBAL.plot.plot_all_detections
        plot_trajectories: GLOBAL.plot.plot_trajectories
        draw_tracking_circles: GLOBAL.plot.plot_tracking_circles
        print_available: false
