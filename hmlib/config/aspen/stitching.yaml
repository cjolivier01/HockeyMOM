aspen:
  # Keep the context surface area small; only the keys requested by each
  # plugin (input_keys) plus shared are threaded between trunks.
  minimal_context: true

  plugins:
    stitching:
      class: hmlib.aspen.plugins.stitching_plugin.StitchingPlugin
      depends: []
      enabled: GLOBAL.stitching.enabled
      params:
        pto_project_file: GLOBAL.stitching.pto_project_file
        dir_name: GLOBAL.stitching.dir_name
        blend_mode: GLOBAL.stitching.blend_mode
        max_blend_levels: GLOBAL.stitching.max_blend_levels
        auto_adjust_exposure: GLOBAL.stitching.auto_adjust_exposure
        python_blender: GLOBAL.stitching.python_blender
        use_cuda_pano_n: GLOBAL.stitching.use_cuda_pano_n
        minimize_blend: GLOBAL.stitching.minimize_blend
        dtype: GLOBAL.stitching.dtype
        no_cuda_streams: GLOBAL.stitching.no_cuda_streams
        post_stitch_rotate_degrees: GLOBAL.stitching.post_stitch_rotate_degrees
        left_color_pipeline: GLOBAL.stitching.left_stitch_pipeline
        right_color_pipeline: GLOBAL.stitching.right_stitch_pipeline
        capture_rgb_stats: GLOBAL.stitching.capture_rgb_stats
        max_output_width: GLOBAL.stitching.max_output_width

    apply_camera:
      class: hmlib.camera.apply_camera_plugin.ApplyCameraPlugin
      depends: [stitching]
      enabled: true
      params:
        # Inline the pipeline here so this config is self-contained and
        # does not depend on GLOBAL.* references.
        video_out_pipeline:
          - type: HmImageColorAdjust
          - type: HmMakeVisibleImage
        # For stitching we always keep the full panorama.
        crop_output_image: false
        crop_play_box: false
        end_zones: false

    video_out_prep:
      class: hmlib.aspen.plugins.video_out_prep_plugin.VideoOutPrepPlugin
      depends: [apply_camera]
      enabled: true
      params:
        # skip_final_save remains prep-relevant because it controls whether
        # prepared frames are moved to the sink/output device at all.
        skip_final_save: GLOBAL.video_out.skip_final_save
        output_width: GLOBAL.video_out.output_width
        output_height: GLOBAL.video_out.output_height

    video_out:
      class: hmlib.aspen.plugins.video_out_plugin.VideoOutPlugin
      depends: [video_out_prep]
      enabled: true
      params:
        cache_size: 2
        preview_via_sink: false
        skip_final_save: GLOBAL.video_out.skip_final_save
        bit_rate: GLOBAL.video_out.bit_rate

    video_preview:
      class: hmlib.aspen.plugins.video_preview_plugin.VideoPreviewPlugin
      depends: [video_out_prep]
      enabled: true
      params:
        cache_size: 1
